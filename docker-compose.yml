version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    # Overrides the Dockerfile CMD to enable auto-reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app  # Syncs your local code to the container instantly
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: npm run dev
    volumes:
      - ./frontend:/app # Syncs your local React code
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  pgdata: